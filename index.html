<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
  <title>Edgar — Marketing Automation</title>
  <meta name="description" content="Marketing automation specialist. Email flows, CDP integration, SMS, WhatsApp & more." />

  <!-- Canonical + hreflang for SEO / ads -->
  <link rel="canonical" href="https://yourusername.github.io/en" id="canonical-tag" />
  <link rel="alternate" hreflang="en" href="https://yourusername.github.io/en" />
  <link rel="alternate" hreflang="fr" href="https://yourusername.github.io/fr" />
  <link rel="alternate" hreflang="x-default" href="https://yourusername.github.io/" />

  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      color-scheme: light only;
      --bg: #e8e4d9;
      --card: #f0ece1;
      --border: #2a2a2a;
      --ink: #1a1a1a;
      --muted: #6b6560;
      --accent: #c8f53e;
      --accent2: #ff5c35;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      color-scheme: light only;
      background: #e8e4d9;
    }

    body {
      background: #e8e4d9 !important;
      color: #1a1a1a !important;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
    }

    /* ─── LANG TOGGLE ─── */
    .lang-bar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 10px 18px 0;
      position: absolute;
      top: 42px; /* below ticker */
      right: 0;
      z-index: 10;
      pointer-events: none;
    }
    .lang-toggle {
      display: flex;
      background: #f0ece1 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: 100px;
      overflow: hidden;
      box-shadow: 2px 2px 0 #2a2a2a;
      pointer-events: all;
    }
    .lang-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .lang-btn.active {
      background: var(--ink);
      color: var(--accent);
    }

    /* ─── TICKER ─── */
    .ticker-wrap {
      width: 100%;
      background: var(--ink);
      overflow: hidden;
      padding: 8px 0;
    }
    .ticker {
      display: flex;
      width: max-content;
      animation: ticker 26s linear infinite;
    }
    .ticker span {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      padding: 0 28px;
    }
    .ticker span.sep { color: var(--accent2); padding: 0 4px; }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ─── CONTAINER ─── */
    .container {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      position: relative;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 52px 0 24px; /* extra top for lang bar */
    }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #2a2a2a;
      margin: 16px auto 20px;
      overflow: hidden;
      background: #c8c4b9 !important;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-ring .avatar-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: #1a1a1a !important;
      letter-spacing: 2px;
    }

    .greeting {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ─── GLITCH NAME ─── */
    .name-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 14px;
    }
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 16vw, 72px);
      line-height: 1;
      color: #1a1a1a !important;
      letter-spacing: 0.04em;
      position: relative;
      display: inline-block;
    }
    .name::before,
    .name::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: inherit;
      line-height: 1;
    }
    .name::before {
      color: var(--accent2);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch1 3.5s infinite steps(1);
    }
    .name::after {
      color: #3af;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      animation: glitch2 3.5s infinite steps(1);
    }
    @keyframes glitch1 {
      0%,89%  { transform: translate(0,0); opacity: 0; }
      90%     { transform: translate(-3px, 1px); opacity: 1; }
      92%     { transform: translate(3px,-1px); opacity: 1; }
      94%,100%{ transform: translate(0,0); opacity: 0; }
    }
    @keyframes glitch2 {
      0%,91%  { transform: translate(0,0); opacity: 0; }
      92%     { transform: translate(4px, 2px); opacity: 1; }
      95%     { transform: translate(-3px,-1px); opacity: 1; }
      97%,100%{ transform: translate(0,0); opacity: 0; }
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 300px;
      margin: 0 auto;
    }
    .tagline strong { color: var(--ink); }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 18px 0 0;
    }
    .badge {
      background: var(--ink);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
    }
    .badge.alt { background: var(--accent2); color: #fff; }

    /* ─── DIVIDER ─── */
    .divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 28px 0;
      opacity: 0.2;
    }

    /* ─── SECTION LABEL ─── */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 14px;
    }

    /* ─── LINK CARDS ─── */
    .link-stack { display: flex; flex-direction: column; gap: 10px; }

    .link-card {
      display: flex;
      align-items: center;
      background: #f0ece1 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 14px 18px;
      text-decoration: none;
      color: #1a1a1a !important;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 3px 3px 0 #2a2a2a;
      gap: 14px;
      cursor: pointer;
    }
    .link-card:hover  { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--border); }
    .link-card:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 var(--border); }

    .link-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1.5px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      background: #e8e4d9 !important;
    }
    .link-text { flex: 1; }
    .link-title {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }
    .link-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .link-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }

    .card-featured {
      background: #1a1a1a !important;
      border-color: #1a1a1a !important;
      color: #c8f53e !important;
      box-shadow: 3px 3px 0 #ff5c35;
    }
    .card-featured .link-title { color: #c8f53e !important; }
    .card-featured .link-sub   { color: #999 !important; }
    .card-featured .link-arrow { color: #c8f53e !important; }
    .card-featured .link-icon  { background: #2a2a2a !important; border-color: #444 !important; }
    .card-featured:hover { box-shadow: 5px 5px 0 #ff5c35; }

    .card-yt {
      border-color: #ff0000 !important;
      box-shadow: 3px 3px 0 #ff0000 !important;
    }
    .card-yt:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #ff0000 !important; }
    .card-yt .link-icon { border-color: #ff0000 !important; }

    /* ─── CHANNELS ─── */
    .channels { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .channel-pill {
      background: #f0ece1 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      color: #1a1a1a !important;
      text-transform: uppercase;
    }

    /* ─── SOCIAL ─── */
    .social-row { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
    .social-btn {
      width: 42px; height: 42px;
      border-radius: 10px;
      border: 1.5px solid #2a2a2a;
      background: #f0ece1 !important;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      color: #1a1a1a !important;
      font-size: 18px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 2px 2px 0 #2a2a2a;
    }
    .social-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #2a2a2a; }

    /* ─── FORM ─── */
    .form-box {
      background: #f0ece1 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: 3px 3px 0 #2a2a2a;
    }
    .form-box h3 {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-box p { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .input-row { display: flex; flex-direction: column; gap: 10px; }
    .input-row input {
      background: #e8e4d9 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #1a1a1a !important;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: #aaa8a2; }
    .input-row input:focus { border-color: var(--accent2); }
    .submit-btn {
      background: var(--ink);
      color: var(--accent);
      border: 1.5px solid var(--ink);
      border-radius: 8px;
      padding: 13px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .submit-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

    /* ─── MORE ABOUT ME ─── */
    .about-section { display: flex; flex-direction: column; gap: 14px; }

    .about-block {
      background: #f0ece1 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: 3px 3px 0 #2a2a2a;
    }
    .about-block-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6b6560;
      margin-bottom: 10px;
    }
    .about-block-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #1a1a1a !important;
      margin-bottom: 4px;
    }

    /* Music card */
    .music-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #1a1a1a !important;
      border-radius: 10px;
      padding: 14px 16px;
      text-decoration: none;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .music-card:hover { opacity: 0.85; }
    .music-art {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: linear-gradient(135deg, #fc3c44, #ff6b6b);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: white;
      flex-shrink: 0;
    }
    .music-info { flex: 1; }
    .music-track {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .music-meta { font-size: 11px; color: #888; margin-top: 3px; }
    .music-play {
      font-size: 20px;
      color: #fc3c44;
      flex-shrink: 0;
    }

    /* Book cards */
    .book-cards { display: flex; flex-direction: column; gap: 10px; }
    .book-card {
      display: flex;
      gap: 12px;
      align-items: center;
      text-decoration: none;
      color: #1a1a1a !important;
      background: #e8e4d9 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 12px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 2px 2px 0 #2a2a2a;
    }
    .book-card:hover { transform: translate(-2px,-2px); box-shadow: 4px 4px 0 #2a2a2a; }
    .book-cover {
      width: 44px;
      height: 62px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #ccc;
      background: #ccc;
    }
    .book-info { flex: 1; }
    .book-name {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.4;
      color: #1a1a1a !important;
    }
    .book-author { font-size: 11px; color: #6b6560; margin-top: 2px; }
    .book-status {
      font-family: 'Space Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #1a1a1a;
      color: #c8f53e;
      padding: 3px 8px;
      border-radius: 100px;
      margin-top: 6px;
      display: inline-block;
    }
    .book-status.next { background: #6b6560; color: #e8e4d9; }

    /* Project card */
    .project-card {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #e8e4d9 !important;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 4px;
    }
    .project-icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }
    .project-info { flex: 1; }
    .project-name {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #1a1a1a !important;
      line-height: 1.4;
    }
    .project-desc { font-size: 11px; color: #6b6560; margin-top: 3px; }
    .project-badge {
      font-family: 'Space Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #ff5c35;
      color: #fff;
      padding: 3px 8px;
      border-radius: 100px;
      margin-top: 6px;
      display: inline-block;
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: 40px;
      text-transform: uppercase;
    }

    /* ─── ANIMATIONS ─── */
    .fade-in { opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.55s; }
  </style>
</head>
<body>

    <div class="ticker" id="ticker" aria-hidden="true"></div>
  </div>

  <!-- LANG TOGGLE (above hero, inside container positioning) -->
  <div style="width:100%;max-width:480px;display:flex;justify-content:flex-end;padding:10px 20px 0;position:relative;z-index:10;">
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>

    <hr class="divider" />

    <div class="link-stack fade-in delay-2" id="t-links"></div>

    <hr class="divider" />

/* ─────────────────────────────────────────────
   LANGUAGE DETECTION  (priority order)
   1. URL path  /en  or  /fr  (ad tracking / forced)
   2. Browser language
   3. Default → 'en'
───────────────────────────────────────────── */
function detectLang() {
  const path = window.location.pathname.toLowerCase();
  // Match /en or /en/ or /en/anything — same for fr
  if (/^\/(en)(\/|$)/.test(path)) return 'en';
  if (/^\/(fr)(\/|$)/.test(path)) return 'fr';

  // Browser language
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('fr')) return 'fr';

  return 'en';
}

/* ─────────────────────────────────────────────
   APPLY LANGUAGE
───────────────────────────────────────────── */

  document.documentElement.lang = t.htmlLang;
  document.title = t.pageTitle;
  document.querySelector('meta[name="description"]').setAttribute('content', t.metaDesc);

  // Update canonical
  const base = window.location.origin + window.location.pathname.replace(/\/(en|fr)(\/.*)?$/, '');
  document.getElementById('canonical-tag').href = base + '/' + lang;

  // Toggle buttons
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');

  // Hero
  document.getElementById('t-greeting').textContent = t.greeting;
  document.getElementById('t-tagline').innerHTML    = t.tagline;
  document.getElementById('t-badge-role').textContent = t.badgeRole;

  // Links

    const cls = l.featured ? 'card-featured' : l.yt ? 'card-yt' : '';
    const ext = l.href.startsWith('http') ? 'target="_blank" rel="noopener"' : '';

/* ─────────────────────────────────────────────
   SET LANG  (called by toggle buttons too)
   Updates URL path without page reload
───────────────────────────────────────────── */
function setLang(lang) {
  applyLang(lang);

  // Rewrite path to /en or /fr (keep any query string / hash for UTMs)
  const newPath = '/' + lang;
  const newUrl  = newPath + window.location.search + window.location.hash;
  history.pushState({ lang }, '', newUrl);
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
(function init() {
  const lang = detectLang();
  applyLang(lang);

  // If no lang in path yet, silently push it so back/forward works correctly
  const path = window.location.pathname;
  if (!/^\/(en|fr)(\/|$)/.test(path)) {
    history.replaceState({ lang }, '', '/' + lang + window.location.search + window.location.hash);
  }
})();

// Handle browser back/forward between /en and /fr
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.lang) applyLang(e.state.lang);
});
